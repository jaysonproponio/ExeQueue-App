<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExeQueue QR Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="display-body">
    <main class="display-shell">
      <section class="card qr-card">
        <p class="eyebrow">ExeQueue Join Point</p>
        <h1>Scan QR Code to Join Queue</h1>
        <p class="lead-copy">
          Open the ExeQueue mobile app and scan this QR code to join the queue.
        </p>

        <section
          id="qrStatusMessage"
          class="status-banner status-banner-info compact-banner"
          aria-live="polite"
        >
          Preparing secure QR token...
        </section>

        <div class="qr-frame">
          <img
            id="qrImage"
            alt="Queue join QR code"
            width="360"
            height="360"
          />
          <canvas id="qrCanvas" width="360" height="360" hidden></canvas>
        </div>

        <div class="token-row">
          <span>Current token</span>
          <strong id="qrTokenValue">Waiting for token</strong>
        </div>

        <div class="current-queue-card">
          <span>Current Queue</span>
          <strong id="qrCurrentQueue">A000</strong>
        </div>

        <button id="refreshQrButton" class="secondary-btn">
          Refresh QR
        </button>

        <p class="footnote">
          The QR token should be regenerated by the backend after every
          successful scan.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
