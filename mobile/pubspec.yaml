name: exequeue_mobile
description: ExeQueue university cashier queue management app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  equatable: ^2.0.7
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^19.4.2
  get_it: ^8.0.3
  http: ^1.2.2
  mobile_scanner:
    path: packages/mobile_scanner

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
